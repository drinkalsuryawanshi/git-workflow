name: React Project Artifact
on:
  push:
    branches:
      - main
    paths:
      - "react-app1/**"

  workflow_dispatch: # to run pipeline manually
  # you will get run workflow button in browser
    
env:
  # Forces all actions in this workflow to run on Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react-app1
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node Js
        uses: actions/setup-node@v6

      - name: Install Node Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Upload an Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: react-app1/dist
          
